<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | Apex Construction</title>
  <link rel="stylesheet" href="global.css">
  <link rel="stylesheet" href="components.css">
  <style>
    /* ── 404 Page ── */
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    /* Background */
    .error-bg {
      position: fixed;
      inset: 0;
      background-image: url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=1800&q=80');
      background-size: cover;
      background-position: center;
      z-index: 0;
    }
    .error-overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, rgba(11,11,11,0.97) 0%, rgba(11,11,11,0.88) 50%, rgba(11,11,11,0.75) 100%);
      z-index: 1;
    }

    /* Content */
    .error-body {
      position: relative;
      z-index: 10;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 8rem 2rem 4rem;
    }

    /* Giant 404 */
    .error-404 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(8rem, 22vw, 18rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, rgba(201,168,76,0.18) 0%, rgba(201,168,76,0.06) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
      user-select: none;
      animation: fadeDown 0.9s ease forwards;
    }
    .error-404::after {
      content: '404';
      position: absolute;
      inset: 0;
      font-family: 'Playfair Display', Georgia, serif;
      font-size: inherit;
      font-weight: 900;
      background: none;
      -webkit-text-fill-color: transparent;
      -webkit-text-stroke: 1px rgba(201,168,76,0.2);
      z-index: -1;
    }

    /* Divider */
    .error-divider {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      margin: 0.5rem 0 2.5rem;
      animation: fadeUp 0.8s 0.2s ease both;
    }
    .error-divider-line {
      width: 3rem;
      height: 1px;
      background: var(--gold);
    }
    .error-divider span {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
    }

    /* Message */
    .error-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(1.8rem, 4vw, 3rem);
      font-weight: 700;
      color: #fff;
      line-height: 1.15;
      margin-bottom: 1.25rem;
      animation: fadeUp 0.8s 0.3s ease both;
    }
    .error-title em {
      color: var(--gold);
      font-style: italic;
    }
    .error-desc {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.55);
      max-width: 460px;
      line-height: 1.85;
      margin-bottom: 3rem;
      animation: fadeUp 0.8s 0.4s ease both;
    }

    /* Buttons */
    .error-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
      animation: fadeUp 0.8s 0.5s ease both;
    }

    /* Quick Links */
    .error-links {
      margin-top: 5rem;
      width: 100%;
      max-width: 800px;
      animation: fadeUp 0.8s 0.6s ease both;
    }
    .error-links-title {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      margin-bottom: 1.5rem;
    }
    .error-links-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1px;
      background: rgba(255,255,255,0.05);
    }
    .error-link-item {
      background: rgba(11,11,11,0.6);
      padding: 1.25rem 1rem;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      transition: background 0.25s;
      border: 1px solid transparent;
    }
    .error-link-item:hover {
      background: rgba(201,168,76,0.07);
      border-color: rgba(201,168,76,0.2);
    }
    .error-link-item svg { opacity: 0.5; transition: opacity 0.25s; }
    .error-link-item:hover svg { opacity: 1; }
    .error-link-item span {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      transition: color 0.25s;
    }
    .error-link-item:hover span { color: var(--gold); }

    /* Decorative corner */
    .deco-corner {
      position: fixed;
      bottom: 3rem;
      right: 3rem;
      width: 80px;
      height: 80px;
      border-bottom: 2px solid rgba(201,168,76,0.2);
      border-right: 2px solid rgba(201,168,76,0.2);
      z-index: 10;
      pointer-events: none;
    }
    .deco-corner-tl {
      position: fixed;
      top: 7rem;
      left: 3rem;
      width: 60px;
      height: 60px;
      border-top: 2px solid rgba(201,168,76,0.15);
      border-left: 2px solid rgba(201,168,76,0.15);
      z-index: 10;
      pointer-events: none;
    }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Logo in header for 404 */
    #site-header { background: rgba(11,11,11,0.5) !important; }

    @media (max-width: 600px) {
      .deco-corner, .deco-corner-tl { display: none; }
      .error-links-grid { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body data-page="">

  <!-- Header Fragment -->
  <div id="header-placeholder"></div>

  <div class="error-page">
    <div class="error-bg"></div>
    <div class="error-overlay"></div>

    <!-- Decorative corners -->
    <div class="deco-corner"></div>
    <div class="deco-corner-tl"></div>

    <div class="error-body">

      <!-- 404 Number -->
      <div class="error-404">404</div>

      <!-- Divider label -->
      <div class="error-divider">
        <div class="error-divider-line"></div>
        <span>Page Not Found</span>
        <div class="error-divider-line"></div>
      </div>

      <!-- Message -->
      <h1 class="error-title">
        This Page Doesn't<br><em>Exist.</em>
      </h1>
      <p class="error-desc">
        The page you're looking for may have been moved, renamed, or never built — much like a permit that got lost in the archives.
      </p>

      <!-- Actions -->
      <div class="error-btns">
        <a href="index.html" class="btn-gold">← BACK TO HOME</a>
        <a href="contact.html" class="btn-outline">GET IN TOUCH</a>
      </div>

      <!-- Quick Navigation -->
      <div class="error-links">
        <p class="error-links-title">Or navigate to</p>
        <div class="error-links-grid">
          <a href="index.html" class="error-link-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#C9A84C" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>Home</span>
          </a>
          <a href="about.html" class="error-link-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#C9A84C" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
            <span>About</span>
          </a>
          <a href="services.html" class="error-link-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#C9A84C" stroke-width="1.5"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
            <span>Services</span>
          </a>
          <a href="projects.html" class="error-link-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#C9A84C" stroke-width="1.5"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>
            <span>Projects</span>
          </a>
          <a href="whyus.html" class="error-link-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#C9A84C" stroke-width="1.5"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            <span>Why Us</span>
          </a>
          <a href="contact.html" class="error-link-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#C9A84C" stroke-width="1.5"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            <span>Contact</span>
          </a>
        </div>
      </div>

    </div>
  </div>

  <!-- Footer Fragment -->
  <div id="footer-placeholder"></div>

  <script src="global.js"></script>
</body>
</html>
